[config]
default_to_workspace = false

# Loads sensitive/local values (IOS_DEVICE_ID, the cargo-apk keystore vars, etc.)
# from .env, which is gitignored - see example.env for the template. `defaults_only`
# means anything already exported in your shell/CI takes precedence over .env.
env_files = [
    { path = "./.env", defaults_only = true }
]

[env]
IOS_XCODE_PROJECT_DIR = { value = "ios/FifteenPuzzle", condition = { env_not_set = ["IOS_XCODE_PROJECT_DIR"] } }
IOS_SCHEME = "FifteenPuzzle"
IOS_BUNDLE_ID = "com.joelbuchheimmoore.FifteenPuzzle"

[tasks.desktop]
description = "Run the desktop build (debug)"
command = "cargo"
args = ["run", "-p", "fifteen-gui"]

[tasks.desktop-release]
description = "Build an optimized desktop binary"
command = "cargo"
args = ["build", "-p", "fifteen-gui", "--release"]

[tasks.wasm-target]
description = "Ensure the wasm32 target is installed"
command = "rustup"
args = ["target", "add", "wasm32-unknown-unknown"]

[tasks.web]
description = "Build for the web with trunk"
dependencies = ["wasm-target"]
install_crate = { crate_name = "trunk", binary = "trunk", test_arg = "--version" }
script_runner = "@shell"
script = '''
cd gui
trunk build --release
'''

[tasks.web-serve]
dependencies = ["wasm-target"]
description = "Serve the web build locally for testing"
script_runner = "@shell"
script = '''
cd gui
trunk serve --release
'''

[tasks.ios-target]
description = "Ensure the iOS device target is installed"
command = "rustup"
args = ["target", "add", "aarch64-apple-ios"]

[tasks.ios]
description = "Build the iOS static lib and drop it + header into the Xcode project"
dependencies = ["ios-target"]
script_runner = "@shell"
script = '''
cargo build -p fifteen-gui --release --target aarch64-apple-ios --lib
mkdir -p ${IOS_XCODE_PROJECT_DIR}/lib
mkdir -p ${IOS_XCODE_PROJECT_DIR}/include
cp target/aarch64-apple-ios/release/libfifteen_gui.a ${IOS_XCODE_PROJECT_DIR}/lib/
echo "void bevy_main(void);" > ${IOS_XCODE_PROJECT_DIR}/include/fifteen_gui.h
echo "Copied libfifteen_gui.a and header into ${IOS_XCODE_PROJECT_DIR}"
'''

[tasks.ios-run-device]
description = "Build, install, and launch on a connected iPhone. Set IOS_DEVICE_ID in .env, or pass it inline: IOS_DEVICE_ID=<id> cargo make ios-run-device"
dependencies = ["ios"]
script_runner = "@shell"
script = '''
xcodebuild build \
    -project ${IOS_XCODE_PROJECT_DIR}/${IOS_SCHEME}.xcodeproj \
    -scheme ${IOS_SCHEME} \
    -destination "platform=iOS,id=${IOS_DEVICE_ID}" \
    -derivedDataPath ${IOS_XCODE_PROJECT_DIR}/build

xcrun devicectl device install app --device ${IOS_DEVICE_ID} \
    ${IOS_XCODE_PROJECT_DIR}/build/Build/Products/Debug-iphoneos/${IOS_SCHEME}.app

xcrun devicectl device process launch --device ${IOS_DEVICE_ID} --terminate-existing ${IOS_BUNDLE_ID}
'''

[tasks.icons]
description = "Regenerate app icons from res/app_icon.svg (see icons.mac / icons.linux for the platform-specific implementations cargo-make dispatches to)"
script_runner = "@shell"
script = '''
echo "No icon generation is defined for this platform. See icons.mac / icons.linux in Makefile.toml."
exit 1
'''

[tasks.icons.mac]
description = "Regenerate Android mipmaps + macOS icon from res/app_icon.svg (macOS)"
script_runner = "@shell"
script = '''
set -e

if ! command -v rsvg-convert > /dev/null; then
    echo "rsvg-convert not found. Install it with: brew install librsvg"
    exit 1
fi

mkdir -p android_res/mipmap-mdpi android_res/mipmap-hdpi android_res/mipmap-xhdpi \
         android_res/mipmap-xxhdpi android_res/mipmap-xxxhdpi

rsvg-convert -w 48  -h 48  res/app_icon.svg -o android_res/mipmap-mdpi/ic_launcher.png
rsvg-convert -w 72  -h 72  res/app_icon.svg -o android_res/mipmap-hdpi/ic_launcher.png
rsvg-convert -w 96  -h 96  res/app_icon.svg -o android_res/mipmap-xhdpi/ic_launcher.png
rsvg-convert -w 144 -h 144 res/app_icon.svg -o android_res/mipmap-xxhdpi/ic_launcher.png
rsvg-convert -w 192 -h 192 res/app_icon.svg -o android_res/mipmap-xxxhdpi/ic_launcher.png

# Keep the @2x suffix in the filename below - that is what cargo-bundle
# checks to decide this is the retina-density icon.
rsvg-convert -w 1024 -h 1024 res/app_icon.svg -o res/app_icon_1024@2x.png

echo "Regenerated Android mipmap icons and res/app_icon_1024@2x.png from res/app_icon.svg"
'''

[tasks.icons.linux]
description = "Regenerate Android mipmaps from res/app_icon.svg (Linux)"
script_runner = "@shell"
script = '''
set -e

if ! command -v rsvg-convert > /dev/null; then
    echo "rsvg-convert not found. Install it with: sudo apt install librsvg2-bin"
    exit 1
fi

mkdir -p android_res/mipmap-mdpi android_res/mipmap-hdpi android_res/mipmap-xhdpi \
         android_res/mipmap-xxhdpi android_res/mipmap-xxxhdpi

rsvg-convert -w 48  -h 48  res/app_icon.svg -o android_res/mipmap-mdpi/ic_launcher.png
rsvg-convert -w 72  -h 72  res/app_icon.svg -o android_res/mipmap-hdpi/ic_launcher.png
rsvg-convert -w 96  -h 96  res/app_icon.svg -o android_res/mipmap-xhdpi/ic_launcher.png
rsvg-convert -w 144 -h 144 res/app_icon.svg -o android_res/mipmap-xxhdpi/ic_launcher.png
rsvg-convert -w 192 -h 192 res/app_icon.svg -o android_res/mipmap-xxxhdpi/ic_launcher.png

echo "Regenerated Android mipmap icons from res/app_icon.svg"
'''

[tasks.android-targets]
description = "Install Android rustup targets"
command = "rustup"
args = ["target", "add", "aarch64-linux-android"]

[tasks.android-apk-tool]
description = "Install cargo-apk"
install_crate = { crate_name = "cargo-apk", binary = "cargo-apk", test_arg = "--help" }

[tasks.android-release]
description = "Build an Android APK"
dependencies = ["android-targets", "android-apk-tool"]
command = "cargo"
args = ["apk", "build", "-p", "fifteen-gui", "--lib", "--release"]

[tasks.android-run-release]
description = "Build, install, and launch on a connected Android device/emulator"
dependencies = ["android-targets", "android-apk-tool"]
command = "cargo"
args = ["apk", "run", "-p", "fifteen-gui", "--lib", "--release"]

[tasks.android]
description = "Build an Android APK (debug)"
dependencies = ["android-targets", "android-apk-tool"]
command = "cargo"
args = ["apk", "build", "-p", "fifteen-gui", "--lib"]

[tasks.android-run]
description = "Build, install, and launch on a connected Android device/emulator (debug)"
dependencies = ["android-targets", "android-apk-tool"]
command = "cargo"
args = ["apk", "run", "-p", "fifteen-gui", "--lib"]

[tasks.macos-bundle]
dependencies = ["desktop-release"]
description = "Build a macOS .app bundle"
install_crate = { crate_name = "cargo-bundle", binary = "cargo-bundle", test_arg = "--help" }
script_runner = "@shell"
script = '''
cd gui
cargo bundle --release -f osx
'''

[tasks.macos-install]
description = "Build and install the macOS app to /Applications"
dependencies = ["macos-bundle"]
script_runner = "@shell"
script = '''
rm -rf "/Applications/Fifteen Puzzle.app"
cp -R "target/release/bundle/osx/Fifteen Puzzle.app" /Applications/
echo "Installed to /Applications/Fifteen Puzzle.app"
'''

[tasks.linux-deb-tool]
description = "Install cargo-deb"
install_crate = { crate_name = "cargo-deb", binary = "cargo-deb", test_arg = "--help" }

[tasks.linux-deb]
description = "Build a Debian (.deb) package. Must be run on Linux - see README."
dependencies = ["linux-deb-tool"]
command = "cargo"
args = ["deb", "-p", "fifteen-gui"]

[tasks.linux-deb-install]
description = "Build and install the Debian package with dpkg (needs sudo)"
dependencies = ["linux-deb"]
script_runner = "@shell"
script = '''
set -e
DEB_FILE=$(find target/debian -maxdepth 1 -name "*.deb" | sort | tail -n 1)
if [ -z "$DEB_FILE" ]; then
    echo "No .deb file found in target/debian"
    exit 1
fi
sudo dpkg -i "$DEB_FILE"
echo "Installed $DEB_FILE"
'''
